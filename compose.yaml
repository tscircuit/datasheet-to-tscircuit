services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: "no"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PI_CODING_AGENT_DIR: /app/.runtime/pi-agent
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./.runtime:/app/.runtime
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
